# ── Admission Bot — Central Configuration ──────────────────────────────
# All tunable values live here. No hardcoded constants in any Python file.

# ── Paths ──────────────────────────────────────────────────────────────
corpus_dir: "data/extracted"
extracted_dir: "data/extracted"
csv_output: "data/programs.csv"
db_path: "./admission_assistant.db"


# ── Ollama ─────────────────────────────────────────────────────────────
ollama_model: "qwen2.5:7b-instruct"

# ── Embeddings ─────────────────────────────────────────────────────────
embed_model: "BAAI/bge-base-en-v1.5"
embed_query_prefix: "Represent this sentence for searching relevant passages: "

# ── RAG chunking ───────────────────────────────────────────────────────
chunk_words: 200
chunk_overlap: 30
rag_top_k: 4

# ── Reranker ──────────────────────────────────────────────────────────
reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
rerank_pool_size: 20

# ── LLM token budgets ─────────────────────────────────────────────────
router_max_tokens: 400
answer_max_tokens: 1024

# ── Fuzzy matching ─────────────────────────────────────────────────────
fuzzy_match_threshold: 60
