# ─── Paths ────────────────────────────────────────────────────────────────────
corpus_dir:    "./data"               # Raw PDFs and TXT files
extracted_dir: "./extracted"          # All extracted output (_clean.json, .md, etc.)
split_dir:     "./extracted/_split_pdfs"  # Temp sub-PDFs (safe to delete after build)
index_dir:     "./data/index"         # FAISS + BM25 index files
db_path:       "./data/admissions.db" # SQLite conversation history

# ─── Special-case files (excluded from auto-ingestion) ────────────────────────
# These need dedicated extraction scripts (complex merged headers, legend blocks, etc.)
special_case_files:
  - "Distribution_of_Seats.pdf"

# ─── Ingestion ────────────────────────────────────────────────────────────────
# A page is "digital" (has real text) if it has at least this many extractable chars.
# Keep low — logos contribute ~0 chars, real body text is well above this threshold.
min_text_chars_for_digital: 50

docling_page_chunk_size: 10   
# Minimum non-whitespace chars for a text block to be kept (TXT processing).
min_txt_block_chars: 10

# Docling thread count
docling_threads: 2

# ─── Models ───────────────────────────────────────────────────────────────────
ollama_model:    "qwen2.5:7b-instruct"
embed_model:     "BAAI/bge-base-en-v1.5"    # 768-dim, better than MiniLM
reranker_model:  "BAAI/bge-reranker-v2-m3"  # multilingual cross-encoder
# Set reranker_model to "" to disable reranking (faster, lower quality)

# ─── Chunking ─────────────────────────────────────────────────────────────────
chunk_words:     400    # max words per text chunk (tables are never split)
chunk_overlap:   50     # word overlap between adjacent text chunks
min_chunk_words: 30     # discard chunks shorter than this

# ─── Retrieval ────────────────────────────────────────────────────────────────
initial_top_k:    20    # candidates before reranking
final_top_k:       5    # chunks sent to LLM after reranking
comparison_top_k:  8    # final_top_k override for comparison queries
table_boost:      1.5   # score multiplier for table chunks on numerical queries
rrf_k:            60    # RRF constant (standard value — do not change)

# ─── Generation ───────────────────────────────────────────────────────────────
answer_max_tokens:    1024
analysis_max_tokens:   256
temperature:           0.1
analysis_temperature:  0.0

# ─── Memory ───────────────────────────────────────────────────────────────────
context_pairs: 2        # number of prior QA pairs to include in context
